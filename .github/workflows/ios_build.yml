name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate iOS folder from fresh template (Windows never creates it)
        run: |
          # Create a temp Flutter project to get complete iOS template files
          flutter create /tmp/ios_template \
            --project-name crispr_sim \
            --org com.crisprsim \
            --platforms ios
          # Replace our empty ios/ with the properly generated one
          rm -rf ios
          cp -r /tmp/ios_template/ios ios
          echo "=== iOS folder contents ==="
          ls -la ios/
          echo "=== Podfile exists? ==="
          cat ios/Podfile | head -5

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS release (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=API_BASE_URL=https://crispr-sim-backend.onrender.com

      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r CRISPR-Sim.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CRISPR-Sim-iOS
          path: CRISPR-Sim.ipa
