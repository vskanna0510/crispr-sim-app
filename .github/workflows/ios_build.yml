name: Build iOS IPA

on:
  workflow_dispatch:   # run manually from GitHub Actions tab

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure iOS platform files exist
        run: flutter create --platforms=ios . --project-name crispr_sim

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=API_BASE_URL=https://crispr-sim-backend.onrender.com

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r CRISPR-Sim.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CRISPR-Sim-iOS
          path: CRISPR-Sim.ipa
